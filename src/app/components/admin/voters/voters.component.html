<div class="h100 simple-background" fxLayout="row">
    <div style="padding: 10px;" fxFlex fxLayout="column"  fxLayoutGap="5px">
        <div>
            <p-card>
                <ng-Template>
                    <div fxLayout="row" fxLayoutGap="5px">
                        <span class="p-float-label w-full">
                            <input class="w-full" pInputText id="party_name" />
                            <label htmlFor="party_name">Constituency Name</label>
                        </span>
                        <span class="p-float-label">
                            <p-dropdown [options]="statusOptions" [(ngModel)]="selectedStatus" placeholder="Select a Status" optionLabel="name" inputId="float-label"></p-dropdown>
                            <label for="float-label">Select a Status</label>
                        </span>
                        <p-button [style]="{'width': 'max-content'}" label="Apply Filters" styleClass="p-button-raised"></p-button>
                    </div>
                </ng-Template>
            </p-card>
        </div>
        <div fxFlex="90%">
            <p-card [style]="{'height': '100%'}">
                <ng-Template>
                    <div>
                        <p-table [value]="allVotersData" [tableStyle]="{ 'min-width': '50rem' }">
                            <ng-template pTemplate="header">
                                <tr>
                                    <th>Voter Name</th>
                                    <th>Constituency</th>
                                    <th>Email</th>
                                    <th>National Registration No#</th>
                                    <th>Status</th>
                                    <th>Doc</th>
                                    <th>Actions</th>
                                </tr>
                            </ng-template>
                            <ng-template pTemplate="body" let-voter>
                                <tr>
                                    <td>{{ getFullName(voter) }}</td>
                                    <td>{{ voter?.constituency_id.name }}</td>
                                    <td>{{ voter?.email }}</td>
                                    <td>{{ voter?.reg_no }}</td>
                                    <td>{{ getVoterStatus(voter.vote_status) }}</td>
                                    <td><i class="pi pi-eye" style="font-size: 1rem;cursor: pointer;" (click)="viewVoterDoc(voter.imageURL)"></i></td>
                                    <td>
                                        <p-button icon="fa-solid fa-user-secret" (onClick)="updateUser('convert', voter)" styleClass="p-button-rounded p-button-text"></p-button>
                                        <p-button *ngIf="voter.vote_status !== 'verified'" (onClick)="updateUser('verify', voter)" icon="fa-solid fa-user-check" styleClass="p-button-rounded p-button-text"></p-button>
                                        <p-button *ngIf="voter.vote_status !== 'rejected'" (onClick)="updateUser('reject', voter)" icon="fa-solid fa-user-minus" styleClass="p-button-rounded p-button-text"></p-button>
                                        <p-button icon="fa-solid fa-trash-can" (onClick)="updateUser('delete', voter)" styleClass="p-button-rounded p-button-text" />
                                    </td>
                                </tr>
                            </ng-template>
                        </p-table>
                    </div>
                </ng-Template>
            </p-card>
        </div>
    </div>
</div>

<p-dialog header="National Document" [modal]="true" [(visible)]="visibleDialog" (onHide)="mainURL = ''">
    <app-image-previewer *ngIf="visibleDialog" [docURL]="mainURL" ></app-image-previewer>
</p-dialog>
<p-toast position="bottom-right" key="br"></p-toast>
